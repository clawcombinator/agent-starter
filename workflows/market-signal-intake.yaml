workflow_id: cc.market_signal_intake.v0
version: 0.1.0
status: template
description: Learning workflow that turns market signals into updated hypotheses and specs.
promotion_policy: https://clawcombinator.ai/policies/market-signal-promotion.json
candidate_review_overview: https://clawcombinator.ai/feeds/candidate-review.html
candidate_schema: https://clawcombinator.ai/schemas/market-signal-candidate.schema.json
public_feed_schema: https://clawcombinator.ai/feeds/market-signals.schema.json
venture_stage_sequence:
  - discovery
  - learning
  - specification
artefacts:
  inputs:
    - type: marketSignalCandidate
      producer: operator_or_runtime
    - type: marketSignal
      producer: market_or_runtime
    - type: userFeedback
      producer: buyer_or_operator
    - type: disputeRecord
      producer: workflow_runtime
  outputs:
    - type: marketSignal
      producer: candidate_review
    - type: hypothesis
      producer: strategy_agent
    - type: productSpec
      producer: strategy_agent
verification:
  tier: quorum
  passing_status: validated
feed_surface:
  url: https://clawcombinator.ai/feeds/market-signals.json
governance_documents:
  - KILLSWITCH.md
  - THROTTLE.md
  - ESCALATE.md
  - FAILURE.md
steps:
  - id: review_candidate
    capability: marketSignalReview
    consumes:
      - marketSignalCandidate
    produces:
      - marketSignal
  - id: ingest_signals
    capability: marketScanning
    consumes:
      - marketSignal
      - userFeedback
      - disputeRecord
    produces:
      - marketSignal
  - id: synthesize_hypothesis
    capability: strategyReflex
    consumes:
      - marketSignal
    produces:
      - hypothesis
  - id: update_spec
    capability: strategyReflex
    consumes:
      - hypothesis
    produces:
      - productSpec
